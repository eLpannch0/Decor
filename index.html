<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; background:transparent; overflow:hidden; }

/* BADGE */
#badge {
  position:absolute;
  top:20px;
  left:20px;
  padding:12px 22px;
  border-radius:18px;
  font-family:Arial;
  font-size:22px;
  color:#fff;
  background:rgba(40,40,40,0.6);

  /* неоновый эффект */
  box-shadow:0 0 15px #a855f7, 0 0 35px #a855f7;

  /* мягкая пульсация */
  animation:pulse 2s infinite alternate;
}

@keyframes pulse {
  from { box-shadow:0 0 10px #a855f7; }
  to { box-shadow:0 0 25px #a855f7, 0 0 50px #a855f7; }
}
</style>
</head>

<body>

<div id="badge">● IRL LIVE 🇨🇦</div>

</body>
</html>
