<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; overflow:hidden; background:transparent; font-family:Arial; }

/* BADGE */
#badge {
  position:absolute;
  top:20px;
  left:20px;
  padding:10px 18px;
  border-radius:12px;
  color:#fff;
  background:rgba(0,0,0,0.5);
  font-size:20px;
  box-shadow:0 0 10px #a855f7, 0 0 25px #a855f7;
  animation:pulse 2s infinite alternate;
}

@keyframes pulse {
  from { box-shadow:0 0 10px #a855f7; }
  to { box-shadow:0 0 25px #a855f7, 0 0 50px #a855f7; }
}

/* TEXT */
#text {
  position:absolute;
  bottom:80px;
  left:50%;
  transform:translateX(-50%);
  font-size:40px;
  font-weight:bold;
  color:#fff;
  padding:14px 28px;
  border-radius:16px;
  background:rgba(0,0,0,0.45);
  text-shadow:0 0 10px #fff, 0 0 20px #a855f7;
  opacity:0;
}

/* ANIMATION */
.show {
  animation:fade 8s ease;
}

@keyframes fade {
  0% { opacity:0; transform:translate(-50%,40px); }
  10% { opacity:1; transform:translate(-50%,0); }
  80% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,40px); }
}
</style>
</head>

<body>

<div id="badge">● IRL LIVE 🇨🇦</div>
<div id="text">Пиши в чат</div>

<script>
const phrases = [
"Пиши в чат — отвечаю",
"Не молчи 💬",
"Еду и читаю чат 🚴",
"Подпишись, если впервые",
"Canada IRL Live"
];

function showText() {
  const el = document.getElementById("text");
  el.innerText = phrases[Math.floor(Math.random()*phrases.length)];
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

setInterval(showText, 10000);
showText();
</script>

</body>
</html>
