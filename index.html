<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body { margin:0; overflow:hidden; background:transparent; font-family:Arial; }

/* badge */
#badge {
  position:absolute;
  top:20px;
  left:20px;
  padding:8px 16px;
  border-radius:10px;
  color:#fff;
  background:rgba(0,0,0,0.5);
  box-shadow:0 0 10px #a855f7, 0 0 20px #a855f7;
  font-size:18px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0% { box-shadow:0 0 5px #a855f7; }
  100% { box-shadow:0 0 20px #a855f7, 0 0 40px #a855f7; }
}

/* floating text */
#text {
  position:absolute;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  font-size:28px;
  color:#fff;
  background:rgba(0,0,0,0.4);
  padding:10px 20px;
  border-radius:12px;
  opacity:0;
}

.show {
  animation: fade 8s;
}

@keyframes fade {
  0% { opacity:0; transform:translate(-50%,20px); }
  10% { opacity:1; transform:translate(-50%,0); }
  80% { opacity:1; }
  100% { opacity:0; transform:translate(-50%,20px); }
}
</style>
</head>

<body>

<div id="badge">● IRL LIVE 🇨🇦</div>
<div id="text">Пиши в чат</div>

<script>
const phrases = [
"Пиши в чат — отвечаю",
"Не молчи 💬",
"Еду и читаю чат 🚴",
"Подпишись, если впервые",
"Canada IRL Live"
];

function showText() {
  const el = document.getElementById("text");
  el.innerText = phrases[Math.floor(Math.random()*phrases.length)];
  el.classList.remove("show");
  void el.offsetWidth;
  el.classList.add("show");
}

setInterval(showText, 12000);
showText();
</script>

</body>
</html>
